<!DOCTYPE html>
<html lang="zh-TW">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
<title>唐詩微互動 · Digital Twin Blue</title>
<link href="https://fonts.googleapis.com/css2?family=Noto+Serif+TC:wght@300;400;500;700&family=Noto+Sans+TC:wght@300;400;500&family=JetBrains+Mono:wght@300;400&display=swap" rel="stylesheet">
<style>
/* ══════════════════════════════════════════════
   RESET & VARIABLES - Digital Twin Blue
══════════════════════════════════════════════ */
*, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
:root {
  --serif: 'Noto Serif TC', 'Songti SC', Georgia, serif;
  --sans:  'Noto Sans TC', 'PingFang TC', sans-serif;
  --mono:  'JetBrains Mono', monospace;

  /* 核心數位雙生配色系統 */
  --mood-color: #2a7a8c;
  --dt-blue-bright: #42a5f5;
  --dt-blue-dark: #0d1a2e;
  --dt-cyan: #00d4ff;
  --dt-gold: #c8a217;

  --bg-from: #04090f;
  --bg-to: #0a1420;
  --transition-speed: 600ms;
}

html, body {
  height: 100%;
  background: #04090f;
  font-family: var(--serif);
  -webkit-font-smoothing: antialiased;
  overscroll-behavior: none;
}

/* ══════════════════════════════════════════════
   PHONE FRAME (desktop centering)
══════════════════════════════════════════════ */
.phone-frame {
  width: 390px;
  height: 844px;
  max-height: 100vh;
  margin: 0 auto;
  position: relative;
  overflow: hidden;
  background: #040810;
  box-shadow: 0 0 80px rgba(0,212,255,0.15);
}
@media (max-width: 430px) {
  .phone-frame { width: 100vw; height: 100vh; max-height: 100dvh; }
}

/* ══════════════════════════════════════════════
   VIEWS (selector / reader)
══════════════════════════════════════════════ */
.view {
  position: absolute;
  inset: 0;
  opacity: 0;
  pointer-events: none;
  transition: opacity 400ms ease;
}
.view.active {
  opacity: 1;
  pointer-events: all;
}

/* ══════════════════════════════════════════════
   SELECTOR VIEW
══════════════════════════════════════════════ */
#view-selector {
  background: #040810;
  display: flex;
  flex-direction: column;
}
.selector-header {
  padding: 52px 20px 20px;
  border-bottom: 1px solid rgba(0,212,255,.08);
}
.selector-header h1 {
  font-size: 22px;
  font-weight: 500;
  color: var(--dt-cyan);
  letter-spacing: .04em;
  line-height: 1.3;
  text-shadow: 0 0 10px rgba(0,212,255,0.4);
}
.selector-header p {
  font-family: var(--mono);
  font-size: 10px;
  color: rgba(0,212,255,.35);
  letter-spacing: .12em;
  margin-top: 6px;
}
.selector-grid {
  flex: 1;
  overflow-y: auto;
  padding: 16px;
  display: grid;
  grid-template-columns: 1fr 1fr;
  gap: 10px;
}
.selector-grid::-webkit-scrollbar { display: none; }

.mood-card {
  border-radius: 12px;
  padding: 14px 12px 18px;
  cursor: pointer;
  position: relative;
  overflow: hidden;
  background: rgba(13, 26, 46, 0.8);
  border: 1px solid rgba(66, 165, 245, 0.3);
  transition: transform 150ms ease, box-shadow 150ms ease, border-color 150ms ease;
  min-height: 160px;
  display: flex;
  flex-direction: column;
  justify-content: space-between;
}
.mood-card:active { transform: scale(.96); }
.mood-card:hover {
  border-color: var(--dt-cyan) !important;
  box-shadow: 0 0 15px rgba(0,212,255,0.2);
}
.mood-card::before {
  content: '';
  position: absolute;
  inset: 0;
  background: linear-gradient(135deg, rgba(0,212,255,.06) 0%, transparent 60%);
  pointer-events: none;
}
.card-emoji { font-size: 22px; margin-bottom: 6px; }
.card-mood {
  font-family: var(--mono);
  font-size: 9px;
  letter-spacing: .14em;
  text-transform: uppercase;
  color: rgba(0,212,255,.55);
  margin-bottom: 4px;
}
.card-mood-zh {
  font-size: 10px;
  color: rgba(0,212,255,.7);
  font-family: var(--sans);
}
.card-title {
  font-size: 18px;
  font-weight: 500;
  color: rgba(255,255,255,.92);
  letter-spacing: .08em;
}
.card-author {
  font-size: 11px;
  color: rgba(255,255,255,.55);
  margin-top: 2px;
  font-family: var(--sans);
}
.card-line {
  font-size: 11px;
  color: rgba(0,212,255,.4);
  font-style: italic;
  margin-top: 6px;
  line-height: 1.4;
}

/* ══════════════════════════════════════════════
   READER VIEW — 3-ZONE LAYOUT
══════════════════════════════════════════════ */
#view-reader {
  display: grid;
  grid-template-rows: 30px 1fr 56px;
  background: var(--bg-from);
  transition: background var(--transition-speed) ease;
}

/* Zone 1 — Mood Bar */
.mood-bar {
  display: flex;
  align-items: center;
  justify-content: space-between;
  padding: 0 16px;
  background: rgba(13, 26, 46, 0.9);
  backdrop-filter: blur(4px);
  border-bottom: 1px solid rgba(0, 212, 255, 0.2);
  position: relative;
  z-index: 10;
}
.mood-bar-left {
  display: flex;
  align-items: center;
  gap: 8px;
}
.mood-strip {
  width: 8px;
  height: 14px;
  border-radius: 2px;
  background: var(--mood-color);
  transition: background 600ms ease;
}
.mood-label {
  font-family: var(--mono);
  font-size: 9px;
  letter-spacing: .14em;
  color: rgba(0,212,255,.5);
  text-transform: uppercase;
}
.mood-label-zh {
  font-family: var(--sans);
  font-size: 10px;
  color: rgba(0,212,255,.7);
  margin-left: 4px;
}
.mood-bar-emoji { font-size: 14px; }
.back-btn {
  background: none;
  border: none;
  color: rgba(0,212,255,.4);
  font-size: 18px;
  cursor: pointer;
  padding: 0 4px;
  line-height: 1;
  transition: color 200ms;
}
.back-btn:active { color: rgba(0,212,255,.9); }

/* Zone 2 — Main Reading Zone */
.reading-zone {
  position: relative;
  overflow: hidden;
  display: flex;
  flex-direction: column;
  align-items: center;
  justify-content: center;
  padding: 0 24px;
}
.poem-meta {
  position: absolute;
  top: 32px;
  left: 0; right: 0;
  text-align: center;
}
.poem-meta-title {
  font-size: 13px;
  color: rgba(0,212,255,.78);
  letter-spacing: .12em;
  font-family: var(--sans);
  font-weight: 300;
}
.poem-meta-author {
  font-size: 11px;
  color: rgba(0,212,255,.52);
  font-family: var(--mono);
  margin-top: 3px;
  letter-spacing: .08em;
}

.poem-lines {
  text-align: center;
  position: relative;
  z-index: 2;
}
.poem-line {
  font-size: 26px;
  font-weight: 400;
  color: rgba(255,255,255,.88);
  letter-spacing: .18em;
  line-height: 2.2;
  display: block;
  transition: color 400ms ease, filter 800ms ease, font-size 200ms ease;
  cursor: default;
  white-space: nowrap;
}
.poem-line.dim { color: rgba(255,255,255,.3); }
.poem-line.highlight { color: rgba(255,255,255,.98); }

/* Zone 3 — Bottom Interaction Bar */
.interaction-bar {
  display: flex;
  align-items: center;
  justify-content: space-around;
  padding: 0 24px;
  background: rgba(4, 9, 15, 0.95);
  backdrop-filter: blur(8px);
  border-top: 1px solid rgba(0, 212, 255, 0.2);
  position: relative;
  z-index: 10;
}
.bar-btn {
  display: flex;
  flex-direction: column;
  align-items: center;
  gap: 3px;
  background: none;
  border: none;
  cursor: pointer;
  padding: 6px 16px;
  border-radius: 8px;
  transition: background 200ms;
}
.bar-btn:active { background: rgba(0,212,255,.08); }
.bar-btn-icon { font-size: 18px; color: var(--dt-cyan); }
.bar-btn-label {
  font-family: var(--sans);
  font-size: 9px;
  color: rgba(0, 212, 255, 0.6);
  letter-spacing: .06em;
}
.bar-divider {
  width: 1px;
  height: 28px;
  background: rgba(0,212,255,.1);
}

/* ══════════════════════════════════════════════
   EMOJI PANEL (overlay)
══════════════════════════════════════════════ */
.emoji-panel {
  position: absolute;
  bottom: 56px;
  left: 0; right: 0;
  background: rgba(4, 9, 15, 0.98);
  backdrop-filter: blur(16px);
  border-top: 1px solid rgba(0,212,255,.15);
  padding: 20px;
  transform: translateY(100%);
  transition: transform 320ms cubic-bezier(.32,0,.15,1);
  z-index: 20;
  border-radius: 16px 16px 0 0;
}
.emoji-panel.open { transform: translateY(0); }
.emoji-panel-title {
  font-family: var(--sans);
  font-size: 11px;
  color: rgba(0,212,255,.5);
  text-align: center;
  letter-spacing: .1em;
  margin-bottom: 16px;
}
.emoji-grid {
  display: grid;
  grid-template-columns: repeat(6, 1fr);
  gap: 8px;
}
.emoji-opt {
  font-size: 24px;
  text-align: center;
  padding: 8px 4px;
  border-radius: 8px;
  cursor: pointer;
  transition: background 150ms, transform 150ms;
}
.emoji-opt:active { background: rgba(0,212,255,.12); transform: scale(1.2); }
.plutchik-hint {
  margin-top: 14px;
  text-align: center;
  font-family: var(--sans);
  font-size: 10px;
  color: rgba(0,212,255,.3);
  line-height: 1.6;
}

/* ══════════════════════════════════════════════
   MICRO-INTERACTION: MOON PULSE (sad · 靜夜思)
══════════════════════════════════════════════ */
.moon-container {
  position: absolute;
  top: 50%;
  right: 30px;
  transform: translateY(-50%);
  opacity: 0;
  pointer-events: none;
  z-index: 1;
  transition: opacity 600ms ease-in;
}
.moon-container.visible { opacity: 1; }
.moon-container.fading { opacity: 0; transition: opacity 1200ms ease-out; }

.moon-svg {
  width: 64px;
  height: 64px;
  animation: none;
}
.moon-svg.pulsing {
  animation: moonPulse 2s cubic-bezier(.45,.05,.55,.95) infinite;
}

@keyframes moonPulse {
  0%, 100% { transform: scale(1); filter: drop-shadow(0 0 8px rgba(0,212,255,.2)); }
  50%       { transform: scale(1.05); filter: drop-shadow(0 0 16px rgba(0,212,255,.45)); }
}

/* ══════════════════════════════════════════════
   MICRO-INTERACTION: SUNRISE (hopeful · 登鸛雀樓)
══════════════════════════════════════════════ */
.sunrise-overlay {
  position: absolute;
  inset: 0;
  opacity: 0;
  background: linear-gradient(180deg, #4a1942 0%, #f4a261 55%, #fef9ef 100%);
  transition: opacity 1000ms ease-in-out;
  pointer-events: none;
  z-index: 0;
}
.sunrise-overlay.active { opacity: 1; }

.ascend-counter {
  position: absolute;
  top: 40%;
  left: 50%;
  transform: translate(-50%, -50%) scale(.8);
  font-family: var(--mono);
  font-size: 11px;
  letter-spacing: .14em;
  color: rgba(0,212,255,.9);
  opacity: 0;
  pointer-events: none;
  z-index: 5;
  transition: opacity 400ms, transform 400ms;
  white-space: nowrap;
  text-align: center;
}
.ascend-counter.show {
  opacity: 1;
  transform: translate(-50%, -50%) scale(1);
}
.ascend-counter.hide {
  opacity: 0;
  transform: translate(-50%, -60%) scale(.9);
  transition: opacity 800ms ease-out, transform 800ms ease-out;
}

/* ══════════════════════════════════════════════
   MICRO-INTERACTION: BLUR REVEAL (mysterious · 錦瑟)
══════════════════════════════════════════════ */
.poem-line.blurred {
  filter: blur(4px);
  cursor: pointer;
  transition: filter 800ms ease;
  color: rgba(0,212,255,.5);
}
.poem-line.blurred:hover { filter: blur(3px); }

.interpretation-tip {
  position: absolute;
  bottom: 50%;
  left: 50%;
  transform: translate(-50%, 50%) scale(.95);
  width: 280px;
  background: rgba(4, 9, 15, 0.96);
  border: 1px solid rgba(66, 165, 245, 0.3);
  border-radius: 12px;
  padding: 16px 18px;
  opacity: 0;
  pointer-events: none;
  z-index: 20;
  transition: opacity 200ms ease, transform 200ms ease;
}
.interpretation-tip.visible {
  opacity: 1;
  transform: translate(-50%, 50%) scale(1);
  pointer-events: all;
}
.tip-title {
  font-family: var(--sans);
  font-size: 10px;
  color: rgba(0,212,255,.7);
  letter-spacing: .12em;
  margin-bottom: 10px;
  text-align: center;
}
.tip-item {
  font-size: 12px;
  color: rgba(180,220,240,.8);
  line-height: 1.7;
  margin-bottom: 6px;
  font-family: var(--sans);
}
.tip-question {
  font-size: 11px;
  color: rgba(0,212,255,.5);
  text-align: center;
  margin-top: 10px;
  font-style: italic;
}
.tip-close {
  position: absolute;
  top: 10px; right: 12px;
  font-size: 14px;
  color: rgba(0,212,255,.3);
  cursor: pointer;
  background: none; border: none;
}

.unsolved-badge {
  position: absolute;
  top: 32px;
  right: 16px;
  font-family: var(--mono);
  font-size: 9px;
  letter-spacing: .1em;
  color: rgba(0,212,255,.6);
  border: 1px solid rgba(0,212,255,.3);
  padding: 3px 8px;
  border-radius: 10px;
  opacity: 0;
  transition: opacity 600ms;
}
.unsolved-badge.show { opacity: 1; }

/* Star particles (錦瑟 background) */
.stars {
  position: absolute;
  inset: 0;
  overflow: hidden;
  pointer-events: none;
  z-index: 0;
}
.star {
  position: absolute;
  width: 2px;
  height: 2px;
  border-radius: 50%;
  background: rgba(0,212,255,.6);
  animation: twinkle var(--dur, 3s) ease-in-out infinite;
  animation-delay: var(--delay, 0s);
}
@keyframes twinkle {
  0%, 100% { opacity: .2; transform: scale(1); }
  50%       { opacity: .8; transform: scale(1.5); }
}

/* ══════════════════════════════════════════════
   MICRO-INTERACTION: PETAL FALL (lighthearted · 春曉)
══════════════════════════════════════════════ */
.petal {
  position: absolute;
  width: 14px;
  height: 20px;
  border-radius: 50% 0 50% 0;
  opacity: 0;
  pointer-events: none;
  z-index: 1;
  animation: petalDrift var(--dur, 3.5s) ease-in-out forwards;
  animation-delay: var(--delay, 0s);
}

@keyframes petalDrift {
  0%   { opacity: 0;   transform: translateX(0) translateY(-20px) rotate(0deg); }
  10%  { opacity: .6; }
  80%  { opacity: .4; }
  100% {
    opacity: 0;
    transform: translateX(var(--drift, 20px)) translateY(600px) rotate(var(--rot, 120deg));
  }
}

/* ══════════════════════════════════════════════
   MICRO-INTERACTION: HEARTBEAT RIPPLE (emotional · 琵琶行)
══════════════════════════════════════════════ */
.ripple-container {
  position: absolute;
  bottom: 30%;
  left: 50%;
  transform: translateX(-50%);
  pointer-events: none;
  z-index: 1;
}
.ripple-ring {
  position: absolute;
  top: 50%; left: 50%;
  transform: translate(-50%, -50%) scale(0);
  width: 100px;
  height: 100px;
  border-radius: 50%;
  border: 2px solid var(--mood-color);
  opacity: 0;
}
.ripple-ring.animate {
  animation: rippleOut 800ms ease-out forwards;
}
.ripple-ring:nth-child(2) { animation-delay: 200ms; }
.ripple-ring:nth-child(3) { animation-delay: 400ms; }
@keyframes rippleOut {
  0%   { transform: translate(-50%, -50%) scale(0); opacity: .7; }
  100% { transform: translate(-50%, -50%) scale(3.5); opacity: 0; }
}

/* ══════════════════════════════════════════════
   MICRO-INTERACTION: BELL WAVE (reflective · 楓橋夜泊)
══════════════════════════════════════════════ */
.bell-wave {
  position: absolute;
  bottom: 20%;
  left: 50%;
  transform: translateX(-50%);
  font-size: 28px;
  opacity: 0;
  pointer-events: none;
  z-index: 3;
  transition: opacity 600ms ease;
}
.bell-wave.show { opacity: .8; animation: bellGlow 1.5s ease-out forwards; }
@keyframes bellGlow {
  0%   { transform: translateX(-50%) scale(.8); opacity: 0; filter: blur(2px); }
  30%  { opacity: .9; filter: blur(0); transform: translateX(-50%) scale(1); }
  100% { opacity: 0; transform: translateX(-50%) scale(1.1); }
}
.wave-ring {
  position: absolute;
  bottom: 20%;
  left: 50%;
  transform: translateX(-50%) scale(0);
  width: 60px; height: 60px;
  border-radius: 50%;
  border: 1px solid rgba(0,212,255,.6);
  opacity: 0;
}
.wave-ring.animate {
  animation: bellWave 2s ease-out forwards;
}
.wave-ring:nth-child(2) { animation-delay: .4s; border-color: rgba(0,212,255,.4); }
.wave-ring:nth-child(3) { animation-delay: .8s; border-color: rgba(0,212,255,.2); }
@keyframes bellWave {
  0%   { transform: translateX(-50%) scale(0); opacity: .8; }
  100% { transform: translateX(-50%) scale(5); opacity: 0; }
}

/* ══════════════════════════════════════════════
   MICRO-INTERACTION: SHAKE (tense · 塞下曲)
══════════════════════════════════════════════ */
.poem-line.shaking {
  animation: lineShake 100ms ease-in-out 3;
}
@keyframes lineShake {
  0%, 100% { transform: translateX(0); }
  25%       { transform: translateX(-3px); }
  75%       { transform: translateX(3px); }
}
.snow-particle {
  position: absolute;
  width: 4px; height: 4px;
  border-radius: 50%;
  background: rgba(255,255,255,.8);
  pointer-events: none;
  z-index: 1;
  animation: snowFall var(--dur, 2.5s) linear forwards;
  animation-delay: var(--delay, 0s);
}
@keyframes snowFall {
  0%   { opacity: 0; transform: translateY(0) translateX(0); }
  10%  { opacity: .8; }
  90%  { opacity: .5; }
  100% { opacity: 0; transform: translateY(400px) translateX(var(--drift, 20px)); }
}

/* ══════════════════════════════════════════════
   MICRO-INTERACTION: SAIL (inspiring · 行路難)
══════════════════════════════════════════════ */
.sail-container {
  position: absolute;
  bottom: 25%;
  left: -60px;
  pointer-events: none;
  z-index: 2;
  opacity: 0;
}
.sail-container.sailing {
  opacity: 1;
  animation: sailAcross 2000ms linear forwards;
}
.sail-container.fading {
  opacity: 0;
  transition: opacity 1200ms ease-out;
}
@keyframes sailAcross {
  0%   { left: -60px; opacity: 0; }
  10%  { opacity: 1; }
  90%  { opacity: 1; }
  100% { left: 420px; opacity: 0; }
}

/* ══════════════════════════════════════════════
   MICRO-INTERACTION: GRAVITY LIFT (challenging · 登高)
══════════════════════════════════════════════ */
.poem-line.lifting {
  animation: gravityLift 600ms ease-out forwards;
}
@keyframes gravityLift {
  0%   { transform: translateY(24px); opacity: 0; }
  100% { transform: translateY(0); opacity: 1; }
}

/* ══════════════════════════════════════════════
   NOTIFICATION TOAST
══════════════════════════════════════════════ */
.toast {
  position: absolute;
  bottom: 70px;
  left: 50%;
  transform: translateX(-50%) translateY(20px);
  background: rgba(13, 26, 46, 0.97);
  border: 1px solid rgba(0,212,255,.2);
  border-radius: 20px;
  padding: 8px 18px;
  font-family: var(--sans);
  font-size: 12px;
  color: rgba(0,212,255,.85);
  opacity: 0;
  pointer-events: none;
  white-space: nowrap;
  transition: opacity 300ms, transform 300ms;
  z-index: 30;
}
.toast.show {
  opacity: 1;
  transform: translateX(-50%) translateY(0);
}

/* ══════════════════════════════════════════════
   REFLECTIVE: breathing ambient
══════════════════════════════════════════════ */
.breathing-bg {
  position: absolute;
  inset: 0;
  background: radial-gradient(ellipse at 50% 60%, rgba(0,180,200,.12) 0%, transparent 70%);
  animation: breathe 4s ease-in-out infinite;
  pointer-events: none;
  z-index: 0;
}
@keyframes breathe {
  0%, 100% { opacity: .4; transform: scale(1); }
  50%       { opacity: .9; transform: scale(1.08); }
}

/* ══════════════════════════════════════════════
   INFORMATIVE: tooltip
══════════════════════════════════════════════ */
.info-tooltip {
  position: absolute;
  background: rgba(13, 26, 46, 0.95);
  border: 1px solid var(--dt-cyan);
  box-shadow: 0 0 20px rgba(0, 212, 255, 0.3);
  border-radius: 10px;
  padding: 12px 14px;
  width: 220px;
  font-family: var(--sans);
  font-size: 11px;
  color: rgba(180,230,240,.85);
  line-height: 1.7;
  opacity: 0;
  pointer-events: none;
  z-index: 20;
  transform: translateY(-8px);
  transition: opacity 300ms ease, transform 300ms ease;
}
.info-tooltip.show { opacity: 1; pointer-events: all; transform: translateY(0); }
.info-tooltip-title {
  font-weight: 500;
  color: rgba(0,212,255,.9);
  margin-bottom: 6px;
  font-size: 12px;
}
.poem-line .highlight-word {
  border-bottom: 1px solid rgba(0,212,255,.5);
  cursor: pointer;

function showToast(msg, dur = 2000) {

  t.classList.add('show');
  setTimeout(() => t.classList.remove('show'), dur);

function sleep(ms) { return new Promise(r => setTimeout(r, ms)); }

    card.innerHTML = `
      <div>
        <div class="card-emoji">${p.emoji}</div>
        <div class="card-mood">${p.mood}</div>
        <div class="card-mood-zh">${p.moodZh}</div>
      </div>

        <div class="card-author">${p.author}</div>

    card.addEventListener('click', () => openPoem(p));
    grid.appendChild(card);
  });

function openPoem(poem) {
  state.currentPoem = poem;
  state.microTriggered = false;

  // Update CSS variables
  const frame = document.querySelector('.phone-frame');
  frame.style.setProperty('--mood-color', poem.color);

  // Update reader UI
  document.getElementById('moodStrip').style.background = poem.color;
  document.getElementById('moodLabel').textContent = poem.mood;
  document.getElementById('moodLabelZh').textContent = poem.moodZh;
  document.getElementById('moodEmoji').textContent = poem.emoji;
  document.getElementById('poemTitle').textContent = `〈${poem.title}〉`;
  document.getElementById('poemAuthor').textContent = `${poem.author} · 唐`;

  // Set background
  const reader = document.getElementById('view-reader');
  reader.style.background = `linear-gradient(180deg, ${poem.bgFrom} 0%, ${poem.bgTo} 100%)`;

  // Build reading zone
  buildReadingZone(poem);

  // Build emoji panel
  buildEmojiPanel(poem);

  // Switch views
  document.getElementById('view-selector').classList.remove('active');
  document.getElementById('view-reader').classList.add('active', 'page-enter');
  setTimeout(() => document.getElementById('view-reader').classList.remove('page-enter'), 350);

  // Init micro-interaction
  setTimeout(() => initMicroInteraction(poem), 400);
}

function goBack() {
  // Clean up
  document.getElementById('view-reader').classList.remove('active');
  document.getElementById('view-selector').classList.add('active');
  state.currentPoem = null;
  state.microTriggered = false;
  if (state.emojiPanelOpen) closeEmojiPanel();
}

/* ══════════════════════════════════════════════
   BUILD READING ZONE
══════════════════════════════════════════════ */
function buildReadingZone(poem) {
  const zone = document.getElementById('readingZone');

  // Remove old dynamic content (keep poem-meta)
  const toRemove = zone.querySelectorAll('.poem-lines, .moon-container, .sunrise-overlay, .stars, .ripple-container, .bell-wave, .wave-ring, .sail-container, .breathing-bg, .info-tooltip, .unsolved-badge, .ascend-counter, .interpretation-tip, .petal, .snow-particle');
  toRemove.forEach(el => el.remove());

  // Build lines
  const linesDiv = document.createElement('div');
  linesDiv.className = 'poem-lines';

  poem.lines.forEach((line, i) => {
    const span = document.createElement('span');
    span.className = 'poem-line';
    span.dataset.index = i;
    span.dataset.lineText = line;

    if (poem.micro === 'blur-reveal') {
      span.textContent = line;
      span.classList.add('blurred');
      span.addEventListener('click', () => revealLine(span, poem));
      // Long press
      let pressTimer;
      span.addEventListener('touchstart', () => { pressTimer = setTimeout(() => showInterpretation(poem, zone), 600); });
      span.addEventListener('touchend', () => clearTimeout(pressTimer));
      span.addEventListener('mousedown', () => { pressTimer = setTimeout(() => showInterpretation(poem, zone), 600); });
      span.addEventListener('mouseup', () => clearTimeout(pressTimer));
    } else if (poem.micro === 'info-tooltip' && line.includes(poem.infoWord)) {
      // Wrap keyword
      const parts = line.split(poem.infoWord);
      span.textContent = '';
      span.appendChild(document.createTextNode(parts[0]));
      const kw = document.createElement('span');
      kw.className = 'highlight-word';
      kw.textContent = poem.infoWord;
      kw.addEventListener('click', (e) => { e.stopPropagation(); showInfoTooltip(poem, zone, kw); });
      span.appendChild(kw);
      if (parts[1]) span.appendChild(document.createTextNode(parts[1]));
    } else if (poem.micro === 'shake-snow') {
      // Highlight shake words
      let html = line;
      poem.shakeWords.forEach(w => {
        if (line.includes(w)) {
          html = html.replace(w, `<span class="highlight-word" data-shake="${w}">${w}</span>`);
        }
      });
      span.innerHTML = html;
      span.querySelectorAll('[data-shake]').forEach(el => {
        el.addEventListener('click', () => triggerShake(span, poem, zone));
      });
    } else if (poem.micro === 'bounce-laugh' && line.includes('笑')) {
      span.innerHTML = line.replace('笑', '<span id="laugh-char">笑</span>');
    } else {
      span.textContent = line;
    }

    if (poem.micro === 'gravity-lift') {
      span.style.opacity = '0';
    }

    linesDiv.appendChild(span);
  });

  zone.appendChild(linesDiv);

  // Inject micro-interaction specific elements
  if (poem.micro === 'moon-pulse') injectMoon(zone, poem);
  if (poem.micro === 'sunrise') injectSunrise(zone);
  if (poem.micro === 'blur-reveal') injectStars(zone, poem);
  if (poem.micro === 'blur-reveal') injectInterpretation(zone, poem);
  if (poem.micro === 'heartbeat') injectRipple(zone, poem);
  if (poem.micro === 'bell-wave') injectBell(zone);
  if (poem.micro === 'sail') injectSail(zone, poem);
  if (poem.micro === 'breathing') injectBreathing(zone);
  if (poem.micro === 'blur-reveal') injectUnsolvedBadge(zone, poem);
  if (poem.micro === 'sunrise') injectAscendCounter(zone);
}

  const mc = document.createElement('div');

  mc.id = 'moonContainer';
  mc.innerHTML = `
    <svg class="moon-svg" id="moonSvg" viewBox="0 0 80 80">
      <defs>
        <radialGradient id="moonGrad" cx="40%" cy="40%">
          <stop offset="0%" stop-color="#a8d8f0"/>
          <stop offset="100%" stop-color="#3a7aaa"/>
        </radialGradient>

      <circle cx="40" cy="40" r="28" fill="url(#moonGrad)" opacity=".9"/>
      <circle cx="50" cy="34" r="24" fill="${state.currentPoem?.bgTo || '#0d1a2e'}"/>
    </svg>`;
  zone.appendChild(mc);
}

function injectSunrise(zone) {
  const ov = document.createElement('div');
  ov.className = 'sunrise-overlay';
  ov.id = 'sunriseOverlay';
  zone.appendChild(ov);

function injectAscendCounter(zone) {
  const ctr = document.createElement('div');

  ctr.id = 'ascendCounter';
  ctr.innerHTML = `更上一層樓 &nbsp;+1<br><span style="font-size:9px;opacity:.7">登頂次數 ${state.climbCount + 1}</span>`;
  zone.appendChild(ctr);
}

function injectStars(zone, poem) {
  const stars = document.createElement('div');
  stars.className = 'stars';
  for (let i = 0; i < 22; i++) {
    const s = document.createElement('div');
    s.className = 'star';
    s.style.left = Math.random() * 100 + '%';
    s.style.top = Math.random() * 100 + '%';
    s.style.setProperty('--dur', (2 + Math.random() * 3) + 's');
    s.style.setProperty('--delay', (Math.random() * 3) + 's');
    stars.appendChild(s);
  }
  zone.insertBefore(stars, zone.firstChild);
}

function injectInterpretation(zone, poem) {
  const tip = document.createElement('div');
  tip.className = 'interpretation-tip';
  tip.id = 'interpTip';
  tip.innerHTML = `
    <button class="tip-close" onclick="document.getElementById('interpTip').classList.remove('visible')">×</button>
    <div class="tip-title">〈錦瑟〉詮釋 · INTERPRETATIONS</div>
    ${poem.interpretations.map(t => `<div class="tip-item">・${t}</div>`).join('')}
    <div class="tip-question">你讀到了什麼？</div>`;
  zone.appendChild(tip);
}

function injectUnsolvedBadge(zone, poem) {
  const badge = document.createElement('div');
  badge.className = 'unsolved-badge';
  badge.id = 'unsolvedBadge';
  badge.textContent = '謎題未解 · UNSOLVED';
  if (state.unsolvedPoems.includes(poem.id)) {
    setTimeout(() => badge.classList.add('show'), 800);
  }
  zone.appendChild(badge);
}

function injectRipple(zone) {

function injectBell(zone) {

  zone.appendChild(bw);
  for (let i = 0; i < 3; i++) {
    const wr = document.createElement('div');

}

function injectSail(zone) {

    <path d="M4 48 Q24 44 44 48" stroke="rgba(0,212,255,.5)" stroke-width="1.5" fill="none"/>

function injectBreathing(zone) {

function showInfoTooltip(poem, zone) {
  let tip = zone.querySelector('.info-tooltip');
  if (!tip) {
    tip = document.createElement('div');
    tip.className = 'info-tooltip';
    tip.innerHTML = `
      <div class="info-tooltip-title">${poem.infoContent.title}</div>
      ${poem.infoContent.text}`;
    tip.style.bottom = '45%';
    tip.style.left = '50%';
    tip.style.transform = 'translateX(-50%)';
    zone.appendChild(tip);
    tip.addEventListener('click', () => tip.classList.remove('show'));
  }
  tip.classList.add('show');
  setTimeout(() => tip.classList.remove('show'), 4000);

/* ══════════════════════════════════════════════
   MICRO-INTERACTION DISPATCHER
══════════════════════════════════════════════ */
function initMicroInteraction(poem) {
  switch (poem.micro) {
    case 'moon-pulse':    initMoonPulse(poem);    break;
    case 'sunrise':       initSunrise(poem);       break;
    case 'blur-reveal':   initBlurReveal(poem);    break;
    case 'petal-fall':    initPetalFall(poem);     break;
    case 'heartbeat':     initHeartbeat(poem);     break;
    case 'bell-wave':     initBellWave(poem);      break;
    case 'gravity-lift':  initGravityLift(poem);   break;
    case 'sail':          initSail(poem);          break;
    case 'shake-snow':    /* tap-triggered */       break;
    case 'sword-sweep':   initSwordSweep(poem);    break;
    case 'bounce-laugh':  initBounceLaugh(poem);   break;
    case 'breathing':     /* CSS handles it */      break;
    case 'char-reveal':   initCharReveal(poem);    break;
    case 'info-tooltip':  /* tap-triggered */       break;
  }
}

/* ── Moon Pulse (sad · 靜夜思) ── */
async function initMoonPulse(poem) {
  const lines = document.querySelectorAll('.poem-line');
  if (!lines.length) return;
  const lastLine = lines[lines.length - 1];

  const obs = new IntersectionObserver(async entries => {
    if (entries[0].isIntersecting && !state.microTriggered) {
      state.microTriggered = true;
      obs.disconnect();
      await sleep(1000);

      const mc = document.getElementById('moonContainer');
      if (!mc) return;
      mc.classList.add('visible');

      const svg = document.getElementById('moonSvg');
      if (svg) {
        await sleep(600);
        svg.classList.add('pulsing');
      }

      lines.forEach(l => l.style.fontSize = '24px');

      await sleep(6000);
      mc.classList.add('fading');
      await sleep(1200);
      mc.classList.remove('visible', 'fading');
      if (svg) svg.classList.remove('pulsing');
      lines.forEach(l => l.style.fontSize = '');
    }
  }, { threshold: 0.8 });

  obs.observe(lastLine);
}

/* ── Sunrise Gradient (hopeful · 登鸛雀樓) ── */
async function initSunrise(poem) {
  const lines = document.querySelectorAll('.poem-line');
  const triggerIdx = poem.triggerLine ?? 2;
  const triggerLine = lines[triggerIdx];
  if (!triggerLine) return;

  const obs = new IntersectionObserver(async entries => {
    if (entries[0].isIntersecting && !state.microTriggered) {
      state.microTriggered = true;
      obs.disconnect();

      const overlay = document.getElementById('sunriseOverlay');
      if (overlay) {
        await sleep(300);
        overlay.style.transition = 'opacity 1000ms ease-in-out';
        overlay.classList.add('active');
      }

      lines.forEach(l => { l.style.color = 'rgba(40,25,10,.9)'; });

      await sleep(1200);
      const ctr = document.getElementById('ascendCounter');
      if (ctr) {
        state.climbCount++;
        localStorage.setItem('climbCount', state.climbCount);
        ctr.innerHTML = `更上一層樓 &nbsp;+1<br><span style="font-size:9px;opacity:.7">登頂次數 ${state.climbCount}</span>`;
        ctr.classList.add('show');
        await sleep(1800);
        ctr.classList.add('hide');
      }

      await sleep(5000);
      if (overlay) {
        overlay.style.transition = 'opacity 800ms ease-out';
        overlay.classList.remove('active');
      }
      lines.forEach(l => { l.style.color = ''; });
    }
  }, { threshold: 0.6 });

  obs.observe(triggerLine);
}

/* ── Blur Reveal (mysterious · 錦瑟) ── */
function initBlurReveal() {
  const poem = state.currentPoem;
  if (!state.unsolvedPoems.includes(poem.id)) {
    state.unsolvedPoems.push(poem.id);
    localStorage.setItem('unsolvedPoems', JSON.stringify(state.unsolvedPoems));
  }
}

function revealLine(span, poem) {
  span.classList.remove('blurred');
  const blurredLeft = document.querySelectorAll('.poem-line.blurred').length;
  if (blurredLeft === 0) {
    const idx = state.unsolvedPoems.indexOf(poem.id);
    if (idx > -1) state.unsolvedPoems.splice(idx, 1);
    localStorage.setItem('unsolvedPoems', JSON.stringify(state.unsolvedPoems));
    const badge = document.getElementById('unsolvedBadge');
    if (badge) badge.classList.remove('show');
    showToast('謎題揭開 · 你選擇了一種詮釋');
  }
}

function showInterpretation(poem, zone) {
  const tip = document.getElementById('interpTip');
  if (tip) tip.classList.add('visible');
}

/* ── Petal Fall (lighthearted · 春曉) ── */
function initPetalFall() {
  const zone = document.getElementById('readingZone');
  const colors = ['#ffb7c5', '#ff8fab', '#ffd6e0', '#ffc2d4'];
  for (let i = 0; i < 4; i++) {
    const petal = document.createElement('div');
    petal.className = 'petal';
    const startX = 20 + Math.random() * 300;
    const drift = (Math.random() - 0.5) * 80;
    const rot = 60 + Math.random() * 180;
    petal.style.left = startX + 'px';
    petal.style.top = '-20px';
    petal.style.background = `radial-gradient(ellipse at 35% 35%, ${colors[i]}, rgba(255,182,193,.15))`;
    petal.style.setProperty('--dur', (3 + Math.random() * 1.5) + 's');
    petal.style.setProperty('--delay', (i * 0.5) + 's');
    petal.style.setProperty('--drift', drift + 'px');
    petal.style.setProperty('--rot', rot + 'deg');
    petal.style.transform = `rotate(${Math.random() * 60 - 30}deg)`;
    zone.appendChild(petal);
  }
}

/* ── Heartbeat Ripple (emotional · 琵琶行) ── */
async function initHeartbeat(poem) {
  const lines = document.querySelectorAll('.poem-line');
  const lastLine = lines[lines.length - 1];

  const obs = new IntersectionObserver(async entries => {
    if (entries[0].isIntersecting && !state.microTriggered) {
      state.microTriggered = true;
      obs.disconnect();
      await sleep(1500);
      const rc = document.getElementById('rippleContainer');
      if (!rc) return;
      rc.querySelectorAll('.ripple-ring').forEach((r, i) => {
        setTimeout(() => r.classList.add('animate'), i * 200);
      });
      lines.forEach(l => l.style.transition = 'color 1200ms');
      lines.forEach(l => l.style.color = 'rgba(0,212,255,.9)');
    }
  }, { threshold: 0.8 });

  obs.observe(lastLine);
}

/* ── Bell Wave (reflective · 楓橋夜泊) ── */
async function initBellWave(poem) {
  const lines = document.querySelectorAll('.poem-line');
  const lastLine = lines[lines.length - 1];

  const obs = new IntersectionObserver(async entries => {
    if (entries[0].isIntersecting && !state.microTriggered) {
      state.microTriggered = true;
      obs.disconnect();
      await sleep(2000);

      const bw = document.getElementById('bellWave');
      if (bw) bw.classList.add('show');

      document.querySelectorAll('.wave-ring').forEach((r, i) => {
        setTimeout(() => r.classList.add('animate'), i * 400);
      });

      await sleep(2000);
      if (bw) bw.classList.remove('show');
    }
  }, { threshold: 0.8 });

  obs.observe(lastLine);
}

/* ── Gravity Lift (challenging · 登高) ── */
function initGravityLift() {
  const lines = document.querySelectorAll('.poem-line');
  lines.forEach((line, i) => {
    line.style.opacity = '0';
    setTimeout(() => {
      line.classList.add('lifting');
      line.style.opacity = '1';
    }, i * 150 + 200);
  });
}

/* ── Sail (inspiring · 行路難) ── */
async function initSail(poem) {
  const lines = document.querySelectorAll('.poem-line');
  const triggerIdx = poem.triggerLine ?? 2;
  const triggerLine = lines[triggerIdx];

  const obs = new IntersectionObserver(async entries => {
    if (entries[0].isIntersecting && !state.microTriggered) {
      state.microTriggered = true;
      obs.disconnect();

      const sc = document.getElementById('sailContainer');
      if (!sc) return;
      sc.classList.add('sailing');
      await sleep(2000);
      sc.classList.remove('sailing');
      sc.classList.add('fading');
    }
  }, { threshold: 0.8 });

  if (triggerLine) obs.observe(triggerLine);
}

/* ── Sword Sweep (adventurous · 出塞) ── */
async function initSwordSweep() {
  await sleep(500);
  const zone = document.getElementById('readingZone');
  const sweep = document.createElement('div');
  sweep.style.cssText = `
    position:absolute; top:0; left:-100%; width:60%; height:100%;
    background: linear-gradient(90deg, transparent, rgba(200,162,23,.15), transparent);
    pointer-events:none; z-index:1;
    animation: sweepAcross 600ms ease-out forwards;`;
  const style = document.createElement('style');
  style.textContent = `@keyframes sweepAcross {
    0%   { left: -60%; }
    100% { left: 110%; }
  }`;
  document.head.appendChild(style);
  zone.appendChild(sweep);
  setTimeout(() => sweep.remove(), 700);
}

/* ── Bounce Laugh (funny · 回鄉偶書) ── */
async function initBounceLaugh() {
  await sleep(1200);
  const laughChar = document.getElementById('laugh-char');
  if (laughChar) {
    laughChar.style.display = 'inline-block';
    laughChar.style.animation = 'laughBounce 400ms cubic-bezier(.36,.07,.19,.97) 2';
    const s = document.createElement('style');
    s.textContent = `@keyframes laughBounce {
      0%,100% { transform: scale(1) rotate(0deg); }
      30%      { transform: scale(1.4) rotate(-10deg); }
      70%      { transform: scale(1.2) rotate(8deg); }
    }`;
    document.head.appendChild(s);

    const zone = document.getElementById('readingZone');
    const popup = document.createElement('div');
    popup.textContent = '😄';
    popup.style.cssText = `
      position:absolute; font-size:28px;
      bottom:30%; left:50%; transform:translateX(-50%) translateY(0);
      opacity:0; pointer-events:none; z-index:5;
      animation: popupBounce 1.5s ease-out forwards;`;
    const s2 = document.createElement('style');
    s2.textContent = `@keyframes popupBounce {
      0%   { opacity:0; transform:translateX(-50%) translateY(20px); }
      20%  { opacity:1; transform:translateX(-50%) translateY(-10px); }
      50%  { opacity:.9; transform:translateX(-50%) translateY(0); }
      100% { opacity:0; transform:translateX(-50%) translateY(-30px); }
    }`;
    document.head.appendChild(s2);
    zone.appendChild(popup);
    setTimeout(() => popup.remove(), 1500);
  }
}

/* ── Char Reveal (dark · 春望) ── */
function initCharReveal() {
  const lines = document.querySelectorAll('.poem-line');
  lines.forEach((line, li) => {
    const text = line.textContent;
    line.textContent = '';
    line.style.color = 'rgba(255,255,255,.0)';
    [...text].forEach((ch, ci) => {
      const span = document.createElement('span');
      span.textContent = ch;
      span.style.opacity = '0';
      span.style.display = 'inline-block';
      span.style.transition = `opacity 300ms ease`;
      span.style.transitionDelay = `${li * 400 + ci * 80}ms`;
      line.appendChild(span);
    });
    line.style.color = '';
    setTimeout(() => {
      line.querySelectorAll('span').forEach(s => s.style.opacity = '1');
    }, 50);
  });
}

/* ── Shake + Snow (tense · 塞下曲) ── */
function triggerShake(lineEl) {
  if (lineEl.classList.contains('shaking')) return;
  lineEl.classList.add('shaking');
  setTimeout(() => lineEl.classList.remove('shaking'), 350);

  const zone = document.getElementById('readingZone');
  for (let i = 0; i < 8; i++) {
    const s = document.createElement('div');
    s.className = 'snow-particle';
    s.style.left = (40 + Math.random() * 260) + 'px';
    s.style.top = '0px';
    s.style.setProperty('--dur', (1.5 + Math.random() * 1.5) + 's');
    s.style.setProperty('--delay', (Math.random() * 0.4) + 's');
    s.style.setProperty('--drift', ((Math.random() - 0.5) * 60) + 'px');
    zone.appendChild(s);
    setTimeout(() => s.remove(), 3000);
  }
}

/* ══════════════════════════════════════════════
   EMOJI PANEL
══════════════════════════════════════════════ */
function buildEmojiPanel(poem) {
  const grid = document.getElementById('emojiGrid');
  grid.innerHTML = '';
  poem.emojiSet.forEach(em => {
    const div = document.createElement('div');
    div.className = 'emoji-opt';
    div.textContent = em;
    div.addEventListener('click', () => {
      showToast(`已標記 ${em}`);
      closeEmojiPanel();
      div.style.animation = 'emojiSpring 250ms cubic-bezier(.36,.07,.19,.97)';
    });
    grid.appendChild(div);
  });
  document.getElementById('plutchikHint').textContent =
    `Plutchik 情緒推導：${poem.plutchik}`;
}

function openEmojiPanel() {
  document.getElementById('emojiPanel').classList.add('open');
  state.emojiPanelOpen = true;
}
function closeEmojiPanel() {
  document.getElementById('emojiPanel').classList.remove('open');
  state.emojiPanelOpen = false;
}

/* ══════════════════════════════════════════════
   INTERACTION BAR HANDLERS
══════════════════════════════════════════════ */
document.getElementById('backBtn').addEventListener('click', goBack);

document.getElementById('btnEmoji').addEventListener('click', () => {
  if (state.emojiPanelOpen) closeEmojiPanel();
  else openEmojiPanel();
});

document.getElementById('btnMood').addEventListener('click', () => {
  if (!state.currentPoem) return;
  showToast(`心情：${state.currentPoem.mood} · ${state.currentPoem.moodZh}`);
});

document.getElementById('btnShare').addEventListener('click', () => {
  if (!state.currentPoem) return;
  const poem = state.currentPoem;
  showToast(`分享〈${poem.title}〉— ${poem.highlight}`);
});

// Close emoji panel when tapping outside
document.getElementById('readingZone').addEventListener('click', (e) => {
  if (state.emojiPanelOpen &&
      !e.target.closest('#emojiPanel') &&
      !e.target.closest('#btnEmoji')) {
    closeEmojiPanel();
  }
});

buildSelector();
